<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">✨ Recurso Sugerido por IA</h3>
      <button class="btn-close" (click)="close.emit()">✕</button>
    </div>

    <div class="modal-body">
      <p class="modal-context">
        Refuerzo para <strong>{{ studentName() }}</strong> en el tema <strong>{{ topicName() }}</strong>.
      </p>

      @if (loading()) {
        <div class="loading-state">
          <span class="spinner"></span> Generando recomendación...
        </div>
      } @else if (error()) {
        <div class="error-state">{{ error() }}</div>
      } @else if (resource()) {
        <div class="resource-card">
          <div class="resource-type">{{ resource()!.type }}</div>
          <h4>{{ resource()!.title }}</h4>
          <div class="resource-desc" [innerHTML]="resource()!.description | safeHtml"></div>
        </div>
      }
    </div>

    <div class="modal-actions">
      <button class="btn-primary">Asignar al estudiante</button>
      <button class="btn-secondary" (click)="close.emit()">Cerrar</button>
    </div>
  </div>
</div>
